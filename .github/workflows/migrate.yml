####################################################################
# Couchbase Schema Migration Pipeline
#
# Flow:
#   1. Developer adds a migration file and opens a Pull Request
#   2. `validate` and `dry-run` jobs run automatically on the PR
#      — shows exactly what will change before anyone approves
#   3. PR is reviewed and merged to `main`
#   4. `apply` job runs automatically — migrations are applied to Couchbase
#   5. migration_history.json is committed back to main automatically
####################################################################

name: Couchbase Schema Migration

on:
  pull_request:
    branches: [main]
    paths:
      - "migrations/**"
  push:
    branches: [main]
    paths:
      - "migrations/**"

permissions:
  contents: write   # needed to commit migration_history.json back after apply

jobs:
  # ----------------------------------------------------------------
  # VALIDATE — runs on every PR, no DB connection needed
  # Catches broken YAML, missing fields, tampered history, etc.
  # ----------------------------------------------------------------
  validate:
    name: Validate migration files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cb-migrate
        run: pip install -e .

      - name: Validate all migrations
        run: cb-migrate validate

  # ----------------------------------------------------------------
  # DRY-RUN — runs on every PR
  # Connects to Couchbase and previews exactly what would be applied
  # ----------------------------------------------------------------
  dry-run:
    name: Dry-run preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    env:
      CB_USERNAME: ${{ secrets.CB_USERNAME }}
      CB_PASSWORD: ${{ secrets.CB_PASSWORD_DEV }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cb-migrate
        run: pip install -e .

      - name: Preview pending migrations
        run: cb-migrate dry-run --config config/dev.yml

  # ----------------------------------------------------------------
  # APPLY — runs automatically when a PR is merged to main
  # Applies all pending migrations and commits the updated history
  # ----------------------------------------------------------------
  apply:
    name: Apply migrations
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CB_USERNAME: ${{ secrets.CB_USERNAME }}
      CB_PASSWORD: ${{ secrets.CB_PASSWORD_DEV }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cb-migrate
        run: pip install -e .

      - name: Apply pending migrations
        run: cb-migrate apply --config config/dev.yml --yes

      - name: Commit updated migration history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update migration_history.json [skip ci]"
          file_pattern: migration_history.json
