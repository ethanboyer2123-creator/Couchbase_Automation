####################################################################
# Couchbase Schema Migration Pipeline
#
# Flow:
#   1. Developer adds a migration file and opens a Pull Request
#   2. `validate` and `dry-run` jobs run automatically on the PR
#      — shows exactly what will change before anyone approves
#   3. PR is reviewed and merged to `main`
#   4. `apply` job runs automatically — migrations are applied to Couchbase
#   5. migration_history.json is committed back to main automatically
#
# IP Allowlist:
#   dry-run and apply jobs dynamically add the runner's public IP to
#   Capella's allowlist before connecting, then remove it after.
####################################################################

name: Couchbase Schema Migration

on:
  pull_request:
    branches: [main]
    paths:
      - "migrations/**"
  push:
    branches: [main]
    paths:
      - "migrations/**"

permissions:
  contents: write   # needed to commit migration_history.json back after apply

jobs:
  # ----------------------------------------------------------------
  # VALIDATE — runs on every PR, no DB connection needed
  # Catches broken YAML, missing fields, tampered history, etc.
  # ----------------------------------------------------------------
  validate:
    name: Validate migration files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cb-migrate
        run: pip install -e .

      - name: Validate all migrations
        run: cb-migrate validate

  # ----------------------------------------------------------------
  # DRY-RUN — runs on every PR
  # Connects to Couchbase and previews exactly what would be applied
  # ----------------------------------------------------------------
  dry-run:
    name: Dry-run preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    env:
      CB_USERNAME: ${{ secrets.CB_USERNAME }}
      CB_PASSWORD: ${{ secrets.CB_PASSWORD_DEV }}
      CAPELLA_API_TOKEN: ${{ secrets.CAPELLA_API_TOKEN }}
      CAPELLA_ORG_ID: ${{ secrets.CAPELLA_ORG_ID }}
      CAPELLA_PROJECT_ID: ${{ secrets.CAPELLA_PROJECT_ID }}
      CAPELLA_CLUSTER_ID: ${{ secrets.CAPELLA_CLUSTER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cb-migrate
        run: pip install -e .

      - name: Add runner IP to Capella allowlist
        id: allowlist
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://cloudapi.cloud.couchbase.com/v4/organizations/${CAPELLA_ORG_ID}/projects/${CAPELLA_PROJECT_ID}/clusters/${CAPELLA_CLUSTER_ID}/allowedcidrs" \
            -H "Authorization: Bearer ${CAPELLA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"cidr\": \"${RUNNER_IP}/32\", \"comment\": \"GitHub Actions dry-run runner (auto-added)\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response ($HTTP_CODE): $BODY"
          CIDR_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          echo "cidr_id=$CIDR_ID" >> $GITHUB_OUTPUT
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          # Wait briefly for allowlist to propagate
          sleep 5

      - name: Preview pending migrations
        run: cb-migrate dry-run --config config/dev.yml

      - name: Remove runner IP from Capella allowlist
        if: always()
        run: |
          CIDR_ID="${{ steps.allowlist.outputs.cidr_id }}"
          if [ -n "$CIDR_ID" ]; then
            echo "Removing CIDR ID: $CIDR_ID"
            curl -s -X DELETE \
              "https://cloudapi.cloud.couchbase.com/v4/organizations/${CAPELLA_ORG_ID}/projects/${CAPELLA_PROJECT_ID}/clusters/${CAPELLA_CLUSTER_ID}/allowedcidrs/${CIDR_ID}" \
              -H "Authorization: Bearer ${CAPELLA_API_TOKEN}" \
              -H "Content-Type: application/json"
            echo "IP ${{ steps.allowlist.outputs.runner_ip }} removed from allowlist"
          else
            echo "No CIDR ID found — nothing to remove"
          fi

  # ----------------------------------------------------------------
  # APPLY — runs automatically when a PR is merged to main
  # Applies all pending migrations and commits the updated history
  # ----------------------------------------------------------------
  apply:
    name: Apply migrations
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CB_USERNAME: ${{ secrets.CB_USERNAME }}
      CB_PASSWORD: ${{ secrets.CB_PASSWORD_DEV }}
      CAPELLA_API_TOKEN: ${{ secrets.CAPELLA_API_TOKEN }}
      CAPELLA_ORG_ID: ${{ secrets.CAPELLA_ORG_ID }}
      CAPELLA_PROJECT_ID: ${{ secrets.CAPELLA_PROJECT_ID }}
      CAPELLA_CLUSTER_ID: ${{ secrets.CAPELLA_CLUSTER_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cb-migrate
        run: pip install -e .

      - name: Add runner IP to Capella allowlist
        id: allowlist
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://cloudapi.cloud.couchbase.com/v4/organizations/${CAPELLA_ORG_ID}/projects/${CAPELLA_PROJECT_ID}/clusters/${CAPELLA_CLUSTER_ID}/allowedcidrs" \
            -H "Authorization: Bearer ${CAPELLA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"cidr\": \"${RUNNER_IP}/32\", \"comment\": \"GitHub Actions apply runner (auto-added)\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response ($HTTP_CODE): $BODY"
          CIDR_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          echo "cidr_id=$CIDR_ID" >> $GITHUB_OUTPUT
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          # Wait briefly for allowlist to propagate
          sleep 5

      - name: Apply pending migrations
        run: cb-migrate apply --config config/dev.yml --yes

      - name: Remove runner IP from Capella allowlist
        if: always()
        run: |
          CIDR_ID="${{ steps.allowlist.outputs.cidr_id }}"
          if [ -n "$CIDR_ID" ]; then
            echo "Removing CIDR ID: $CIDR_ID"
            curl -s -X DELETE \
              "https://cloudapi.cloud.couchbase.com/v4/organizations/${CAPELLA_ORG_ID}/projects/${CAPELLA_PROJECT_ID}/clusters/${CAPELLA_CLUSTER_ID}/allowedcidrs/${CIDR_ID}" \
              -H "Authorization: Bearer ${CAPELLA_API_TOKEN}" \
              -H "Content-Type: application/json"
            echo "IP ${{ steps.allowlist.outputs.runner_ip }} removed from allowlist"
          else
            echo "No CIDR ID found — nothing to remove"
          fi

      - name: Commit updated migration history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update migration_history.json [skip ci]"
          file_pattern: migration_history.json
