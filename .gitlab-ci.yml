####################################################################
# Couchbase Schema Migration Pipeline
#
# Stages:
#   validate   → Lint all migration files (no DB connection needed)
#   dry-run    → Connect to target DB and preview changes
#   apply      → Apply migrations (auto on dev/staging, manual on prod)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   CB_USERNAME          Couchbase username (all envs)
#   CB_PASSWORD_DEV      Couchbase password for dev
#   CB_PASSWORD_STAGING  Couchbase password for staging
#   CB_PASSWORD_PROD     Couchbase password for prod
####################################################################

default:
  image: python:3.12-slim
  before_script:
    - pip install --quiet --no-cache-dir -e .

stages:
  - validate
  - dry-run
  - apply

# ------------------------------------------------------------------
# VALIDATE — runs on every push, no DB connection
# ------------------------------------------------------------------
validate:migrations:
  stage: validate
  script:
    - cb-migrate validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ------------------------------------------------------------------
# DRY-RUN — preview on MR / pre-merge
# ------------------------------------------------------------------
dry-run:dev:
  stage: dry-run
  environment: dev
  variables:
    CB_CONFIG: config/dev.yml
    CB_PASSWORD: $CB_PASSWORD_DEV
  script:
    - cb-migrate dry-run --config $CB_CONFIG
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"

dry-run:staging:
  stage: dry-run
  environment: staging
  variables:
    CB_CONFIG: config/staging.yml
    CB_PASSWORD: $CB_PASSWORD_STAGING
  script:
    - cb-migrate dry-run --config $CB_CONFIG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

dry-run:prod:
  stage: dry-run
  environment: production
  variables:
    CB_CONFIG: config/prod.yml
    CB_PASSWORD: $CB_PASSWORD_PROD
  script:
    - cb-migrate dry-run --config $CB_CONFIG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

# ------------------------------------------------------------------
# APPLY — automatic on develop → dev env
#          automatic on main  → staging env
#          manual gate        → production
# ------------------------------------------------------------------
apply:dev:
  stage: apply
  environment: dev
  variables:
    CB_CONFIG: config/dev.yml
    CB_PASSWORD: $CB_PASSWORD_DEV
  script:
    - cb-migrate apply --config $CB_CONFIG --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - dry-run:dev

apply:staging:
  stage: apply
  environment: staging
  variables:
    CB_CONFIG: config/staging.yml
    CB_PASSWORD: $CB_PASSWORD_STAGING
  script:
    - cb-migrate apply --config $CB_CONFIG --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - dry-run:staging

apply:prod:
  stage: apply
  environment: production
  variables:
    CB_CONFIG: config/prod.yml
    CB_PASSWORD: $CB_PASSWORD_PROD
  script:
    - cb-migrate apply --config $CB_CONFIG --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false
  needs:
    - dry-run:prod
