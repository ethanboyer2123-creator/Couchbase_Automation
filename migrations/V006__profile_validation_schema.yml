# Store JSON Schema for the profiles collection.
# Applications retrieve this from _cb_migrate_schemas at startup
# to validate documents before writing to Couchbase.
type: validation
operation: upsert
bucket: app_data
scope: users
collection: profiles
description: "User profile document structure"

schema:
  type: object
  required:
    - user_id
    - email
    - username
    - created_at
  additionalProperties: true
  properties:
    user_id:
      type: string
      description: "Unique user identifier (UUID)"
    email:
      type: string
      format: email
    username:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "^[a-zA-Z0-9_-]+$"
    display_name:
      type: string
      maxLength: 100
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    status:
      type: string
      enum:
        - active
        - suspended
        - deleted
    roles:
      type: array
      items:
        type: string
